<div class="settings-page">
  <h1 class="page-title">{{ 'SETTINGS.TITLE' | translate }}</h1>

  <div class="settings-card">
    <div class="setting-row">
      <div class="setting-info">
        <span class="setting-label">{{ 'SETTINGS.DARK_MODE_LABEL' | translate }}</span>
        <span class="setting-description">{{ 'SETTINGS.DARK_MODE_DESCRIPTION' | translate }}</span>
      </div>
      <button class="toggle-btn" (click)="theme.toggle()" [class.active]="theme.isDark()" [attr.aria-label]="'SETTINGS.TOGGLE_LABEL' | translate">
        <span class="toggle-thumb"></span>
      </button>
    </div>
  </div>

  <div class="settings-card danger-zone">
    <h2 class="danger-title">{{ 'SETTINGS.DANGER_ZONE' | translate }}</h2>
    <div class="setting-row">
      <div class="setting-info">
        <span class="setting-label">{{ 'SETTINGS.CLEAR_DATA_LABEL' | translate }}</span>
        <span class="setting-description">{{ 'SETTINGS.CLEAR_DATA_DESCRIPTION' | translate }}</span>
      </div>
      <button class="btn-destructive" (click)="clearAllData()">{{ 'SETTINGS.CLEAR_DATA_BTN' | translate }}</button>
    </div>
  </div>
</div>

<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <span class="app-title">Plants</span>
      <nav class="nav">
        <a routerLink="/plants" routerLinkActive="nav-active" class="nav-link">{{ 'NAV.PLANTS' | translate }}</a>
        <a routerLink="/settings" routerLinkActive="nav-active" class="nav-link">{{ 'NAV.SETTINGS' | translate }}</a>
      </nav>
    </div>
    <button class="theme-toggle" (click)="theme.toggle()" [title]="(theme.isDark() ? 'THEME.SWITCH_TO_LIGHT' : 'THEME.SWITCH_TO_DARK') | translate" [attr.aria-label]="'THEME.TOGGLE_LABEL' | translate">
      @if (theme.isDark()) {
        <!-- Sun icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      } @else {
        <!-- Moon icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>
  </div>
</header>

<main class="content">
  <router-outlet />
</main>

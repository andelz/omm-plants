<div class="playground">
  <!-- Sidebar nav -->
  <nav class="sidebar" aria-label="Component sections">
    <div class="sidebar-header">
      <a routerLink="/" class="back-link">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        App
      </a>
      <span class="sidebar-title">UI Library</span>
    </div>
    <ul class="sidebar-list">
      @for (s of sections; track s.path) {
        <li>
          <a class="sidebar-link"
             [routerLink]="s.path"
             routerLinkActive="sidebar-link--active">{{ s.label }}</a>
        </li>
      }
    </ul>

    <button class="theme-toggle" (click)="theme.toggle()" type="button"
            [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
      @if (theme.isDark()) {
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Light
      } @else {
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M14 8.5A6.5 6.5 0 017.5 2 5.5 5.5 0 1014 8.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Dark
      }
    </button>
  </nav>

  <!-- Main content -->
  <main class="content">
    <router-outlet />
  </main>
</div>
